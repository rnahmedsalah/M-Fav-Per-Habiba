<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Habiba ❤️</title>
</head>
<body>
    <div id="loading-screen"><div class="heart-loader">💖</div></div>

    <div class="container" id="password-screen" style="display: none;">
        <div style="font-size: 50px;">🌹</div>
        <h1 class="title">𝓗𝓪𝓫𝓲𝓫𝓪</h1>
        <input type="password" id="passInput" placeholder="اكتبي الباسورد...">
        <button onclick="checkPassword()">ادخول ❤️</button>
        <p id="error-msg" style="color:red; display:none;">خطأ!</p>
    </div>

    <div class="container hidden" id="main-content">
        <h1 class="title">𝓗𝓪𝓫𝓲𝓫𝓪</h1>
        <div id="counter">من يوم 1/7: <span id="days"></span> يوم</div>
        <p class="story-text" id="story-paragraph"></p>
        
        <div class="memories">
            <img src="mem1.jpg"><img src="mem2.jpg"><img src="mem3.jpg"><img src="mem4.jpg">
        </div>
        
        <div class="buttons-wrapper">
            <button id="yesBtn" onclick="acceptLove()">YES</button>
            <button id="noBtn" onmouseover="flyAway()">NO</button>
        </div>
        
        <footer style="margin-top:20px; color:#888;">صديقك الوفي<br>ABO SALAH</footer>
    </div>

    <audio id="bg-music1" src="song1.mp3"></audio>
    <audio id="bg-music2" src="song2.mp3"></audio>
    <script src="script.js"></script>
</body>
</html>

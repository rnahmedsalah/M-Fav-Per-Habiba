<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Habiba ❤️</title>
</head>
<body>
    <div id="loading-screen">
        <div class="heart-loader">💖</div>
    </div>

    <div class="container" id="password-screen" style="display: none;">
        <h1 class="title">موقع Habiba</h1>
        <input type="password" id="passInput" placeholder="اكتبي كلمة السر هنا...">
        <button onclick="checkPassword()">دخول ❤️</button>
        <p id="error-msg" style="color:red; display:none;">خطأ! 😼</p>
    </div>

    <div class="container hidden" id="main-content">
        <p id="story-paragraph"></p>
        <button id="yesBtn" onclick="acceptLove()">YES</button>
        <button id="noBtn" onmouseover="flyAway()">NO</button>
    </div>

    <audio id="bg-music" loop src="song.mp3"></audio>
    <script src="script.js"></script>
</body>
</html>
